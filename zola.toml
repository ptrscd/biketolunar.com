# The URL the site will be built for
base_url = "https://biketolunar.com"

# Site title — used by Zola's built-in feed/templates (display title is in [extra] below)
title = "BikeToLunar"

# Whether to automatically compile all Sass files in the sass directory
compile_sass = true

# Whether to build a search index to be used later on by a JavaScript library
build_search_index = false

# Blog Atom feed at /blog/atom.xml (enabled per-section in content/blog/_index.md).
feed_filenames = ["atom.xml"]

# Taxonomies — categories: a small controlled set (Rides, Milestones, Behind the scenes);
# tags: free-form (country names, trail names, …). Set per-post in [taxonomies] front matter.
[[taxonomies]]
name = "tags"

[markdown]

[markdown.highlighting]
theme = "catppuccin-mocha"

[extra]
# ---------------------------------------------------------------------------
# Site identity
# ---------------------------------------------------------------------------
title       = "BikeToLunar"
tagline     = "One rider. 384,400 km. Destination: the Moon."
description = "Peter is cycling the distance to the Moon — follow the journey."
youtube_url = "https://www.youtube.com/@biketolunar"   # the logo links here
logo        = "img/logo.svg"

# Latest YouTube video (manual — this is a no-JS site). Paste the newest video's
# URL + title after each upload; leave latest_video_url empty to hide the card.
latest_video_url   = ""
latest_video_title = ""
og_image    = "img/og-image.png"

# ---------------------------------------------------------------------------
# Progress — total distance is summed from data/distance.json at build time.
# Add a ride entry there and rebuild. goal_km is the fixed Earth→Moon distance.
# ---------------------------------------------------------------------------
goal_km     = 384400

# Tag metadata (group, emoji, description, intro) now lives in per-term Markdown
# files at content/taxonomies/<slug>.md — read by templates/taxonomy_*.html.
# Every tag used on a post needs a matching content/taxonomies/<slug>.md file.

